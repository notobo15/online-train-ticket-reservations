<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout/layout}"
    xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Routes Management</title>


    <!-- bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- font-awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>

<div layout:fragment="content">

    <nav class="page-breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
            <li class="breadcrumb-item" th:href="@{/admin/routes}">Routes</li>
            <li class="breadcrumb-item active" aria-current="page">List</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center flex-wrap grid-margin">
        <h3>Routes Management</h3>
        <a th:href="@{/admin/routes/create}" type="button"
            class="btn btn-outline-primary btn-icon-text mr-2 d-none d-md-flex align-items-center justify-content-center">
            <i class="btn-icon-prepend" data-feather="plus"></i>
            <span>Create</span>
        </a>
    </div>
    <!-- Kiểm tra nếu có thông báo thành công -->
    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}"></span>
    </div>
    <div class="row">
        <div class="col-md-12 grid-margin stretch-card">
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="dataTableExample" class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>start_station</th>
                                    <th>end_station</th>
                                    <th>departure_date</th>
                                    <th>arrival_date</th>
                                    <th style="width: 60px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody th:if="${routes}">
                                <tr th:each="route : ${routes}">
                                    <td th:text="${route.routeId}"></td>
                                    <td th:text="${route.startStation.stationName}"></td>
                                    <td th:text="${route.endStation.stationName}"></td>
                                    <td>2024-09-19 (20:00)</td>
                                    <td>2024-09-20 (08:00)</td>
                                    <td class="actions">
                                        <a th:href="@{/admin/routes/detail/{id}(id=${route.routeId})}">
                                            <i class="btn-icon-prepend text-primary" data-feather="eye"></i>
                                        </a>
                                        <a th:href="@{/admin/routes/edit/{id}(id=${route.routeId})}">
                                            <i class="btn-icon-prepend text-warning" data-feather="edit"></i>
                                        </a>
                                        <form th:action="@{/admin/routes/delete/{id}(id=${route.routeId})}"
                                            method="post" class="deleteForm">
                                            <div type="button" class="deleteBtn">
                                                <i class="btn-icon-prepend text-danger" data-feather="trash-2"></i>
                                            </div>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <nav class="d-flex justify-content-between align-items-center mt-3">
                        <!-- Sizing -->
                        <div th:replace="~{/admin/fragments/_table-size}"></div>
                        <!-- Pagination -->
                        <!-- <div th:replace="~{/admin/fragments/_pagination}"></div> -->
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/admin/routes/index(page=${currentPage - 1}, size=${size})}"
                                    aria-label="Previous">
                                    <span aria-hidden="true">
                                        <i class="btn-icon-prepend" data-feather="chevron-left"></i>
                                    </span>
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:text="${i + 1}"
                                    th:href="@{/admin/routes/index(page=${i}, size=${size})}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                <a class="page-link"
                                    th:href="@{/admin/routes/index(page=${currentPage + 1}, size=${size})}"
                                    aria-label="Next">
                                    <span aria-hidden="true">
                                        <i class="btn-icon-prepend" data-feather="chevron-right"></i>
                                    </span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<div layout:fragment="scripts">
    <script>
        $(document).ready(function () {
            $('#dataTableExample').DataTable({
                "paging": false,
                "info": false,
            });
            $('.deleteBtn').on('click', function (e) {
                e.preventDefault();
                var form = $(this).closest('form');
                $.confirm({
                    title: 'Xác nhận xóa',
                    content: 'Bạn có chắc chắn muốn xóa mục này?',
                    type: 'red',
                    buttons: {
                        ok: {
                            text: 'Delete',
                            btnClass: 'btn-danger',
                            action: function () {
                                form.submit();
                            }
                        },
                        cancel: {
                            text: 'Hủy',
                            action: function () {
                            }
                        }
                    }
                });
            });
        });
    </script>
</div>

</html>
